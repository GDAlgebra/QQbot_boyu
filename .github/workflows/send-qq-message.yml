name: Check X and Send QQ Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Optional manual QQ message. Leave empty to check X/RSS."
        required: false
        type: string
  schedule:
    - cron: "3,33 * * * *"

permissions:
  contents: write

jobs:
  check-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Restore NapCat data cache
        uses: actions/cache/restore@v6
        with:
          path: .napcat-data
          key: napcat-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            napcat-data-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Start RSSHub in GitHub Actions
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          TWITTER_COOKIE: ${{ secrets.TWITTER_COOKIE }}
        run: |
          docker network create qq-notifier || true
          docker run -d \
            --name rsshub-redis \
            --network qq-notifier \
            redis:7-alpine

          docker run -d \
            --name rsshub \
            --network qq-notifier \
            -p 1200:1200 \
            -e NODE_ENV=production \
            -e CACHE_TYPE=redis \
            -e REDIS_URL=redis://rsshub-redis:6379/ \
            -e REQUEST_RETRY=2 \
            -e REQUEST_TIMEOUT=20000 \
            -e TWITTER_AUTH_TOKEN="$TWITTER_AUTH_TOKEN" \
            -e TWITTER_CT0="$TWITTER_CT0" \
            -e TWITTER_COOKIE="$TWITTER_COOKIE" \
            diygod/rsshub:latest

          for i in $(seq 1 36); do
            if curl -fsS http://127.0.0.1:1200/healthz >/dev/null 2>&1 || curl -fsS http://127.0.0.1:1200/ >/dev/null 2>&1; then
              echo "RSSHub is ready."
              exit 0
            fi

            echo "Waiting for RSSHub... attempt $i/36"
            docker logs --tail 80 rsshub || true
            sleep 5
          done

          echo "RSSHub did not become ready. Full logs:"
          docker logs rsshub || true
          exit 1

      - name: Check X for new post
        id: check_x
        env:
          ACTION_MODE: check
          QQ_TARGET_TYPE: ${{ vars.QQ_TARGET_TYPE }}
          X_USERNAME: ${{ vars.X_USERNAME }}
          X_RSS_URL: ${{ vars.X_RSS_URL }}
          SEND_FIRST_RUN: ${{ vars.SEND_FIRST_RUN }}
          MANUAL_MESSAGE: ${{ inputs.message }}
        run: npm run check

      - name: Start NapCat in GitHub Actions
        if: steps.check_x.outputs.should_send == 'true'
        env:
          NAPCAT_QQ: ${{ secrets.NAPCAT_QQ }}
          ONEBOT_ACCESS_TOKEN: ${{ secrets.ONEBOT_ACCESS_TOKEN }}
        run: |
          if [ -z "$NAPCAT_QQ" ]; then
            echo "NAPCAT_QQ secret is required."
            exit 1
          fi

          mkdir -p .napcat-data/QQ .napcat-data/config .napcat-data/cache
          cat > ".napcat-data/config/onebot11_${NAPCAT_QQ}.json" <<EOF
          {
            "network": {
              "httpServers": [
                {
                  "enable": true,
                  "name": "github-actions-http",
                  "host": "0.0.0.0",
                  "port": 3000,
                  "enableCors": true,
                  "enableWebsocket": false,
                  "messagePostFormat": "array",
                  "token": "${ONEBOT_ACCESS_TOKEN}",
                  "debug": true
                }
              ],
              "httpSseServers": [],
              "httpClients": [],
              "websocketServers": [],
              "websocketClients": [],
              "plugins": []
            },
            "musicSignUrl": "",
            "enableLocalFile2Url": false,
            "parseMultMsg": false,
            "imageDownloadProxy": "",
            "timeout": {
              "baseTimeout": 10000,
              "uploadSpeedKBps": 256,
              "downloadSpeedKBps": 256,
              "maxTimeout": 1800000
            }
          }
          EOF
          cat > ".napcat-data/config/napcat_${NAPCAT_QQ}.json" <<EOF
          {
            "fileLog": false,
            "consoleLog": true,
            "fileLogLevel": "debug",
            "consoleLogLevel": "info",
            "packetBackend": "auto",
            "packetServer": "",
            "o3HookMode": 1,
            "bypass": {
              "hook": false,
              "window": false,
              "module": false,
              "process": false,
              "container": false,
              "js": false
            },
            "autoTimeSync": true
          }
          EOF

          docker run -d \
            --name napcat \
            -e NAPCAT_UID="$(id -u)" \
            -e NAPCAT_GID="$(id -g)" \
            -e ACCOUNT="$NAPCAT_QQ" \
            -p 3000:3000 \
            -p 3001:3001 \
            -p 6099:6099 \
            -v "$PWD/.napcat-data/QQ:/app/.config/QQ" \
            -v "$PWD/.napcat-data/config:/app/napcat/config" \
            -v "$PWD/.napcat-data/cache:/app/napcat/cache" \
            mlikiowa/napcat-docker:latest

      - name: Prepare NapCat QR code
        if: steps.check_x.outputs.should_send == 'true'
        run: |
          for i in $(seq 1 24); do
            docker cp napcat:/app/napcat/cache/qrcode.png .napcat-data/qrcode.png 2>/dev/null || true
            if [ -s .napcat-data/qrcode.png ]; then
              echo "NapCat QR code is ready."
              exit 0
            fi

            echo "Waiting for QR code image... attempt $i/24"
            docker logs --tail 60 napcat || true
            sleep 5
          done

          echo "QR code image was not generated yet. Continue waiting in the next step."

      - name: Upload NapCat QR code
        if: steps.check_x.outputs.should_send == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: napcat-qrcode
          path: .napcat-data/qrcode.png
          if-no-files-found: ignore

      - name: Wait for NapCat login and OneBot HTTP
        if: steps.check_x.outputs.should_send == 'true'
        env:
          ONEBOT_ACCESS_TOKEN: ${{ secrets.ONEBOT_ACCESS_TOKEN }}
        run: |
          auth_header=()
          if [ -n "$ONEBOT_ACCESS_TOKEN" ]; then
            auth_header=(-H "Authorization: Bearer $ONEBOT_ACCESS_TOKEN")
          fi

          for i in $(seq 1 72); do
            if curl -fsS -X POST "${auth_header[@]}" \
              -H "Content-Type: application/json" \
              -d '{}' \
              http://127.0.0.1:3000/get_login_info; then
              echo "NapCat OneBot HTTP is ready."
              exit 0
            fi

            echo "Waiting for NapCat login and OneBot HTTP... attempt $i/72"
            docker cp napcat:/app/napcat/cache/qrcode.png .napcat-data/qrcode.png 2>/dev/null || true
            docker logs --tail 80 napcat || true
            sleep 5
          done

          echo "NapCat did not become ready. Full logs:"
          docker cp napcat:/app/napcat/cache/qrcode.png .napcat-data/qrcode.png 2>/dev/null || true
          docker logs napcat || true
          exit 1

      - name: Send QQ message
        if: steps.check_x.outputs.should_send == 'true'
        env:
          ACTION_MODE: send
          ONEBOT_HTTP_URL: http://127.0.0.1:3000
          ONEBOT_ACCESS_TOKEN: ${{ secrets.ONEBOT_ACCESS_TOKEN }}
          QQ_TARGET_TYPE: ${{ vars.QQ_TARGET_TYPE }}
          QQ_TARGET_ID: ${{ secrets.QQ_TARGET_ID }}
        run: npm run check

      - name: Save latest post state
        if: steps.check_x.outputs.state_changed == 'true'
        run: |
          if [ -n "$(git status --porcelain state/latest-post.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/latest-post.json
            git commit -m "Update latest X post state"
            git push
          else
            echo "No state change."
          fi

      - name: Stop NapCat
        if: always() && steps.check_x.outputs.should_send == 'true'
        run: |
          docker logs --tail 120 napcat || true
          docker stop napcat || true

      - name: Stop RSSHub
        if: always()
        run: |
          docker logs --tail 120 rsshub || true
          docker stop rsshub || true
          docker stop rsshub-redis || true

      - name: Save NapCat data cache
        if: always() && steps.check_x.outputs.should_send == 'true'
        uses: actions/cache/save@v6
        with:
          path: .napcat-data
          key: napcat-data-${{ runner.os }}-${{ github.run_id }}
